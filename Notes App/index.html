<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <h1>Notes 📝</h1>
            <button class="new-note-btn" id="newNoteButton">+ New Note</button>
            <input type="search" class="search-input" id="searchInput" placeholder="Search Notes...">
            <span class="filter-label">Filter</span>
            <div class="filter-btns">
                <button class="filter-btn is-active"  data-cat="all">All Notes</button>
                <button class="filter-btn" data-cat="work">Work</button>
                <button class="filter-btn" data-cat="personal">Personal</button>
                <button class="filter-btn" data-cat="ideas">Ideas</button>
            </div>
            <div class="stats" id="stats"></div>
        </aside>
        <main class="main">
            <div class="notes-grid" id="notesGrid"></div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <div style="font-size: 3rem;">📋</div>
                <p>No notes yet. Create your first note!</p>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
