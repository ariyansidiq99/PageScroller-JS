<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scroll Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Website Feed</h1>
    </header>
    <main class="feed">
        <div id="postsContainer"></div>
        <div class="loader" id="loader">
            <p>Loading posts...</p>
        </div>
        <div id="endMessage" class="end-message" style="display: none;">You have reached the end. All cought up!</div>
    </main>
</body>
</html>
